name: osp_app
description: "Aplikacja OSP — raporty z wyjazdów ratowniczych"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.6.1
  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Routing
  go_router: ^14.8.1
  # PDF generation & printing
  pdf: ^3.11.2
  printing: ^5.13.5
  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  # Google integration
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  # Testing
  mocktail: ^1.0.4
  # App icon
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/osp_icon.png"
  adaptive_icon_background: "#B71C1C"
  adaptive_icon_foreground: "assets/icon/osp_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/references/
